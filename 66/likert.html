<!-- LLM generated, with minor adjustments -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Likert Scale</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .likert-question {
      margin-bottom: 20px;
    }

    .likert-options {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .likert-options label {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .likert-options input[type="radio"] {
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="likert-question" align="center" style="font-family:Verdana,sans-serif; font-size:14pt; font-weight:bold">
    <p>How much do you like Pesto Genovese?</p>
    <div class="likert-options">
      <label>
        Disgusting
        <input type="radio" name="satisfaction" value="1">
      </label>
      <label>
        Little
        <input type="radio" name="satisfaction" value="2">
      </label>
      <label>
        Neutral
        <input type="radio" name="satisfaction" value="3">
      </label>
      <label>
        Lots
        <input type="radio" name="satisfaction" value="4">
      </label>
      <label>
        Amazing
        <input type="radio" name="satisfaction" value="5">
      </label>
    </div>
  </div>

  <!-- <button onclick="submitLikert()">Submit</button> -->

  <p id="result"></p>

  <script>
    function submitLikert() {
      const options = document.getElementsByName('satisfaction');
      let selectedValue = null;

      for (const option of options) {
        if (option.checked) {
          selectedValue = option.value;
          break;
        }
      }

      const result = document.getElementById('result');
      if (selectedValue) {
        result.textContent = `You selected: ${selectedValue}`;
      } else {
        result.textContent = 'Please select an option.';
      }
    }
  </script>
</body>
</html>
